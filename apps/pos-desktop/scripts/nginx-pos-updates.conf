# Letakkan file ini di /etc/nginx/sites-available/pos-updates
# lalu: ln -s /etc/nginx/sites-available/pos-updates /etc/nginx/sites-enabled/
# dan:  nginx -s reload

server {
    listen 80;
    server_name server.hammielion.com;

    # Redirect semua HTTP ke HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name server.hammielion.com;

    # SSL — sesuaikan path jika sudah pakai certbot
    ssl_certificate     /etc/letsencrypt/live/server.hammielion.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/server.hammielion.com/privkey.pem;

    # Serve update files POS Desktop
    location /pos-updates/ {
        alias /var/www/pos-updates/;
        autoindex off;

        # Izinkan download .exe dan .yml
        types {
            application/octet-stream exe;
            text/yaml                yml;
        }

        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # Blok akses ke direktori lain
    location / {
        return 404;
    }
}
