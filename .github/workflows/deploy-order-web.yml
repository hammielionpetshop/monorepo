name: Deploy Order Web to Vercel

on:
  push:
    branches:
      - main
    paths:
      - 'apps/order-web/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel environment
        working-directory: apps/order-web
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN_ORDER_WEB }}

      - name: Build project artifacts
        working-directory: apps/order-web
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN_ORDER_WEB }}

      - name: Deploy to Vercel
        working-directory: apps/order-web
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN_ORDER_WEB }}
